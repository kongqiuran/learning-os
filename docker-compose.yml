services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_RELOAD: "false"
      LEARNING_OS_DATA_DIR: /data
      DATABASE_URL: sqlite:////data/database/learning_os.db
    volumes:
      - database:/data/database
      - uploads:/data/uploads
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "worker.py"]
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      LEARNING_OS_DATA_DIR: /data
      DATABASE_URL: sqlite:////data/database/learning_os.db
    volumes:
      - database:/data/database
      - uploads:/data/uploads
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import os,time; path='/data/database/worker-heartbeat'; raise SystemExit(0 if os.path.exists(path) and time.time()-os.path.getmtime(path)<90 else 1)
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy

  backup:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "scripts/backup.py"]
    profiles: ["ops"]
    env_file:
      - .env.production
    environment:
      LEARNING_OS_DATA_DIR: /data
      DATABASE_URL: sqlite:////data/database/learning_os.db
    volumes:
      - database:/data/database
      - uploads:/data/uploads:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  database:
    name: learning-os-database
  uploads:
    name: learning-os-uploads
